spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/content
    username: ${POSTGRES_USER}
    driver-class-name: org.postgresql.Driver
    password: ${POSTGRES_PASSWORD}
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: content-service-group
      properties:
        spring.json.type.mapping: masterPlaylistMessage:io.github.marianciuc.streamingservice.content.kafka.messages.CreateMasterPlayListMessage
        spring.json.trusted.packages: io.github.marianciuc.streamingservice.content.kafka.messages
  jpa:
    hibernate:
      ddl-auto: validate
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    baseline-on-migrate: true
    enabled: true
    baseline-description: "init"
    baseline-version: 0
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
server:
  port: 8060
