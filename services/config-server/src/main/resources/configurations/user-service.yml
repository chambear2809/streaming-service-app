spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/users_db
    username: ${POSTGRES_USER}
    driver-class-name: org.postgresql.Driver
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    baseline-on-migrate: true
    enabled: true
    baseline-description: "init"
    baseline-version: 0
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
  kafka:
    bootstrap-servers: localhost:9092
    template:
      observation-enabled: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: createUserMessage:io.github.marianciuc.streamingservice.user.kafka.messages.CreateUserMessage
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: users-service-group
      properties:
        spring.json.trusted.packages: "io.github.marianciuc.streamingservice.users.dto"
server:
  port: 8050
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
jwt:
  private-key: ${USER_SERVICE_JWT_PRIVATE_KEY}
  public-key: ${USER_SERVICE_JWT_PUBLIC_KEY}
