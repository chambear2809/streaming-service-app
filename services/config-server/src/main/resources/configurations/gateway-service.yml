spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: user-service
          uri: lb:http://USER-SERVICE
          predicates:
            - Path=/jwt/**,/api/v1/users/**,/api/v1/auth/**
        - id: billing-service
          uri: lb:http://BILLING-SERVICE
          predicates:
            - Path=/api/v1/billing/**
server:
  port: 8222
