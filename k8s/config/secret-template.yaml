# Secret Template for Streaming Service App
#
# This is a template for operators deploying the streaming service app from scratch.
# Copy this file, replace all CHANGEME values with real secrets, and apply it to
# your cluster before deploying the backend services:
#
#   kubectl apply -f k8s/config/secret-template.yaml
#
# NOTE: This Secret uses `stringData` (plaintext) rather than `data` (base64) for
# operator convenience. Kubernetes will automatically base64-encode the values
# when storing the Secret in etcd — you do NOT need to encode them yourself.
#
# IMPORTANT: Do NOT commit this file with real secret values to version control.
# Consider using a secrets management tool (e.g. Sealed Secrets, External Secrets
# Operator, Vault) for production environments.

apiVersion: v1
kind: Secret
metadata:
  name: streaming-demo-auth
  namespace: streaming-service-app
type: Opaque

# stringData accepts plaintext values; Kubernetes base64-encodes them automatically.
stringData:
  # Shared secret used to sign/verify authentication tokens (e.g. JWT secret)
  DEMO_AUTH_SECRET: "CHANGEME"

  # Password used for demo account authentication
  DEMO_AUTH_PASSWORD: "CHANGEME"
