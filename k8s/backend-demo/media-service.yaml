apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service-demo
  namespace: streaming-service-app
  labels:
    app.kubernetes.io/name: media-service-demo
    app.kubernetes.io/part-of: streaming-service-app
spec:
  replicas: 1
  progressDeadlineSeconds: 1800
  selector:
    matchLabels:
      app.kubernetes.io/name: media-service-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: media-service-demo
        app.kubernetes.io/part-of: streaming-service-app
      annotations:
        instrumentation.opentelemetry.io/container-names: app
        instrumentation.opentelemetry.io/inject-java: otel-splunk/splunk-otel-collector
    spec:
      initContainers:
        - name: extract-source
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /workspace
              tar -xzf /source/media-service-source.tgz -C /workspace
          volumeMounts:
            - name: source
              mountPath: /source
              readOnly: true
            - name: workspace
              mountPath: /workspace
        - name: stage-demo-movie
          image: jrottenberg/ffmpeg:7.1-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu

              log_step() {
                printf '%s %s\n' "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" "$1"
              }

              download_with_fallback() {
                TARGET_PATH="$1"
                shift

                for SOURCE_URL in "$@"; do
                  ATTEMPT=1

                  if [ -z "${SOURCE_URL}" ]; then
                    continue
                  fi

                  while [ "${ATTEMPT}" -le 5 ]; do
                    log_step "Downloading $(basename "${TARGET_PATH}") from ${SOURCE_URL} (attempt ${ATTEMPT}/5)"
                    if wget -T 60 -U "AcmeDemoLibrary/1.0" -O "${TARGET_PATH}" "${SOURCE_URL}"; then
                      return 0
                    fi

                    rm -f "${TARGET_PATH}"
                    if [ "${ATTEMPT}" -lt 5 ]; then
                      sleep 2
                    fi
                    ATTEMPT=$((ATTEMPT + 1))
                  done

                  log_step "Download failed for ${SOURCE_URL}; trying next mirror"
                done

                log_step "All download attempts failed for $(basename "${TARGET_PATH}")"
                return 1
              }

              materialize_library_asset() {
                SOURCE_PATH="$1"
                TARGET_PATH="$2"
                ASSET_LABEL="$3"

                log_step "Normalizing ${ASSET_LABEL} into a browser-safe MP4"
                if ffmpeg -hide_banner -loglevel warning -y -i "${SOURCE_PATH}" \
                  -map 0:v:0 -map 0:a:0 \
                  -c copy -movflags +faststart \
                  "${TARGET_PATH}"; then
                  return 0
                fi

                rm -f "${TARGET_PATH}"
                log_step "Stream copy was not compatible for ${ASSET_LABEL}; transcoding to MP4"
                ffmpeg -hide_banner -loglevel warning -y -i "${SOURCE_PATH}" \
                  -map 0:v:0 -map 0:a:0 \
                  -c:v libx264 -preset superfast -threads 2 -pix_fmt yuv420p -r 24 -g 48 -keyint_min 48 -sc_threshold 0 \
                  -c:a aac -ar 44100 -b:a 128k -movflags +faststart \
                  "${TARGET_PATH}"
              }

              mkdir -p /opt/demo/library
              mkdir -p /opt/demo/house-loop-segments
              mkdir -p /opt/demo/source

              log_step "Downloading house-loop source assets"
              download_with_fallback /opt/demo/source/big-buck-bunny-source.mov \
                "https://download.blender.org/peach/bigbuckbunny_movies/big_buck_bunny_720p_h264.mov" \
                "https://archive.org/download/BigBuckBunny/big_buck_bunny_720p_h264.mov"
              download_with_fallback /opt/demo/source/elephants-dream-source.mov \
                "https://download.blender.org/ED/elephantsdream-720-h264-st-aac.mov" \
                "https://archive.org/download/ElephantsDream/ed_hd.mp4"
              download_with_fallback /opt/demo/source/sintel-source.mkv \
                "https://download.blender.org/demo/movies/Sintel.2010.720p.mkv" \
                "https://archive.org/download/Sintel/sintel-2048-stereo.mp4"
              download_with_fallback /opt/demo/source/tears-of-steel-source.mov \
                "https://download.blender.org/demo/movies/ToS/tears_of_steel_720p.mov" \
                "https://ftp.nluug.nl/pub/graphics/blender/demo/movies/ToS/tears_of_steel_720p.mov"

              materialize_library_asset /opt/demo/source/big-buck-bunny-source.mov /opt/demo/library/big-buck-bunny.mp4 "Big Buck Bunny"
              materialize_library_asset /opt/demo/source/elephants-dream-source.mov /opt/demo/library/elephants-dream.mp4 "Elephants Dream"
              materialize_library_asset /opt/demo/source/sintel-source.mkv /opt/demo/library/sintel.mp4 "Sintel"
              materialize_library_asset /opt/demo/source/tears-of-steel-source.mov /opt/demo/library/tears-of-steel.mp4 "Tears of Steel"
              cp /opt/demo/library/big-buck-bunny.mp4 /opt/demo/demo.mp4
              log_step "Source downloads complete; preparing 90-second house-loop clips"

              build_house_loop_clip() {
                CLIP_PREFIX="$1"
                INPUT_FILE="$2"
                OUTPUT_FILE="/opt/demo/house-loop-segments/${CLIP_PREFIX}-000.mp4"

                log_step "Preparing house-loop clip for ${CLIP_PREFIX}"
                if ffmpeg -hide_banner -loglevel warning -y -i "${INPUT_FILE}" \
                  -map 0:v:0 -map 0:a:0 \
                  -t 90 \
                  -c copy -movflags +faststart \
                  "${OUTPUT_FILE}"; then
                  return 0
                fi

                rm -f "${OUTPUT_FILE}"
                log_step "Stream copy was not compatible for ${CLIP_PREFIX}; transcoding 90-second clip"
                ffmpeg -hide_banner -loglevel warning -y -i "${INPUT_FILE}" \
                  -map 0:v:0 -map 0:a:0 \
                  -t 90 \
                  -vf "scale=trunc(iw/2)*2:trunc(ih/2)*2" \
                  -c:v libx264 -preset ultrafast -threads 2 -pix_fmt yuv420p -r 24 -g 48 -keyint_min 48 -sc_threshold 0 \
                  -c:a aac -ar 44100 -b:a 128k -movflags +faststart \
                  "${OUTPUT_FILE}"
              }

              wait_for_clip_job() {
                JOB_PID="$1"
                JOB_LABEL="$2"

                if [ -z "${JOB_PID}" ]; then
                  return 0
                fi

                if wait "${JOB_PID}"; then
                  log_step "Finished house-loop clip for ${JOB_LABEL}"
                  return 0
                fi

                log_step "House-loop clip failed for ${JOB_LABEL}"
                return 1
              }

              run_clip_batch() {
                FIRST_LABEL="$1"
                FIRST_INPUT="$2"
                SECOND_LABEL="$3"
                SECOND_INPUT="$4"
                BATCH_FAILED=0

                build_house_loop_clip "${FIRST_LABEL}" "${FIRST_INPUT}" &
                FIRST_PID="$!"
                SECOND_PID=""
                if [ -n "${SECOND_LABEL}" ] && [ -n "${SECOND_INPUT}" ]; then
                  build_house_loop_clip "${SECOND_LABEL}" "${SECOND_INPUT}" &
                  SECOND_PID="$!"
                fi

                if ! wait_for_clip_job "${FIRST_PID}" "${FIRST_LABEL}"; then
                  BATCH_FAILED=1
                fi
                if ! wait_for_clip_job "${SECOND_PID}" "${SECOND_LABEL}"; then
                  BATCH_FAILED=1
                fi

                if [ "${BATCH_FAILED}" -ne 0 ]; then
                  return 1
                fi
              }

              run_clip_batch "010-sintel" "/opt/demo/library/sintel.mp4" "020-big-buck-bunny" "/opt/demo/library/big-buck-bunny.mp4"
              run_clip_batch "030-elephants-dream" "/opt/demo/library/elephants-dream.mp4" "040-tears-of-steel" "/opt/demo/library/tears-of-steel.mp4"
              CLIP_COUNT="$(find /opt/demo/house-loop-segments -maxdepth 1 -type f -name '*.mp4' | wc -l | tr -d ' ')"
              log_step "House-loop clip preparation complete with ${CLIP_COUNT} clip files"
          volumeMounts:
            - name: demo-media
              mountPath: /opt/demo
        - name: stage-ad-clip
          image: jrottenberg/ffmpeg:7.1-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              FONT_BOLD=/usr/share/fonts/dejavu/DejaVuSans-Bold.ttf
              FONT_REGULAR=/usr/share/fonts/dejavu/DejaVuSans.ttf

              cat > /tmp/sponsor-break-filter.txt <<EOF
              [0:v]drawbox=x=72:y=72:w=1136:h=576:color=0xcaa85c:t=6,drawbox=x=120:y=468:w=1040:h=120:color=0x000000@0.20:t=fill,drawtext=fontfile=${FONT_BOLD}:text='ACME NETWORK EAST':fontcolor=white:fontsize=42:x=(w-text_w)/2:y=136,drawtext=fontfile=${FONT_BOLD}:text='SPONSOR BREAK':fontcolor=0xcaa85c:fontsize=72:x=(w-text_w)/2:y=236,drawtext=fontfile=${FONT_BOLD}:text='North Coast Sports Network':fontcolor=white:fontsize=44:x=(w-text_w)/2:y=370,drawtext=fontfile=${FONT_REGULAR}:text='Regional sports launch pod':fontcolor=white:fontsize=28:x=(w-text_w)/2:y=468[v0];
              [1:v]drawbox=x=72:y=72:w=1136:h=576:color=0x8fd3dc:t=6,drawbox=x=120:y=468:w=1040:h=120:color=0x000000@0.20:t=fill,drawtext=fontfile=${FONT_BOLD}:text='ACME NETWORK EAST':fontcolor=white:fontsize=42:x=(w-text_w)/2:y=136,drawtext=fontfile=${FONT_BOLD}:text='SPONSOR BREAK':fontcolor=0x8fd3dc:fontsize=72:x=(w-text_w)/2:y=236,drawtext=fontfile=${FONT_BOLD}:text='Metro Weather Desk':fontcolor=white:fontsize=44:x=(w-text_w)/2:y=370,drawtext=fontfile=${FONT_REGULAR}:text='Storm desk weather sponsorship':fontcolor=white:fontsize=28:x=(w-text_w)/2:y=468[v1];
              [2:v]drawbox=x=72:y=72:w=1136:h=576:color=0xf29d52:t=6,drawbox=x=120:y=468:w=1040:h=120:color=0x000000@0.20:t=fill,drawtext=fontfile=${FONT_BOLD}:text='ACME NETWORK EAST':fontcolor=white:fontsize=42:x=(w-text_w)/2:y=136,drawtext=fontfile=${FONT_BOLD}:text='SPONSOR BREAK':fontcolor=0xf29d52:fontsize=72:x=(w-text_w)/2:y=236,drawtext=fontfile=${FONT_BOLD}:text='City Arts Channel':fontcolor=white:fontsize=44:x=(w-text_w)/2:y=370,drawtext=fontfile=${FONT_REGULAR}:text='Festival takeover pod':fontcolor=white:fontsize=28:x=(w-text_w)/2:y=468[v2];
              [v0][v1][v2]concat=n=3:v=1:a=0[v]
              EOF

              ffmpeg -hide_banner -loglevel warning -y \
                -f lavfi -i color=c=0x0b1622:s=1280x720:r=24:d=5 \
                -f lavfi -i color=c=0x163948:s=1280x720:r=24:d=5 \
                -f lavfi -i color=c=0x3a1d24:s=1280x720:r=24:d=5 \
                -ss 00:00:05 -t 00:00:15 -i /opt/demo/demo.mp4 \
                -filter_complex_script /tmp/sponsor-break-filter.txt \
                -map '[v]' -map 3:a:0 -t 15 \
                -c:v libx264 -preset veryfast -pix_fmt yuv420p -r 24 -c:a aac -ar 44100 -b:a 128k -movflags +faststart \
                /opt/demo/library/sponsor-break.mp4

              ffmpeg -hide_banner -loglevel warning -y \
                -f lavfi -i color=c=0x111111:s=1280x720:r=24:d=3 \
                -ss 00:00:20 -t 00:00:03 -i /opt/demo/demo.mp4 \
                -vf "drawbox=x=72:y=72:w=1136:h=576:color=0xe2b261:t=6,drawbox=x=120:y=452:w=1040:h=136:color=0x000000@0.30:t=fill,drawtext=fontfile=${FONT_BOLD}:text='ACME NETWORK EAST':fontcolor=white:fontsize=42:x=(w-text_w)/2:y=150,drawtext=fontfile=${FONT_BOLD}:text='AD DECISIONING DELAY':fontcolor=0xe2b261:fontsize=64:x=(w-text_w)/2:y=260,drawtext=fontfile=${FONT_BOLD}:text='Awaiting sponsor response':fontcolor=white:fontsize=36:x=(w-text_w)/2:y=370,drawtext=fontfile=${FONT_REGULAR}:text='The break slot will recover automatically when the ad service responds.':fontcolor=white:fontsize=24:x=(w-text_w)/2:y=470" \
                -shortest -map 0:v:0 -map 1:a:0 \
                -c:v libx264 -preset veryfast -pix_fmt yuv420p -r 24 -c:a aac -ar 44100 -b:a 128k -movflags +faststart \
                /opt/demo/library/sponsor-stall.mp4

          volumeMounts:
            - name: demo-media
              mountPath: /opt/demo
        - name: build-app
          image: maven:3.9.9-eclipse-temurin-22
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              cd /workspace/services/media-service
              mvn -f pom.demo.xml -Dmaven.test.skip=true package
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: maven-repo
              mountPath: /root/.m2
      containers:
        - name: app
          image: eclipse-temurin:22-jre
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - java -jar /workspace/services/media-service/target/media-service-demo.jar
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: OTEL_SERVICE_NAME
              value: media-service-demo
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_PROPAGATORS
              value: baggage,b3,tracecontext
            - name: OTEL_DEPLOYMENT_ENVIRONMENT
              value: 'streaming-app'
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=$(OTEL_SERVICE_NAME),service.namespace=streaming-service-app,k8s.namespace.name=streaming-service-app,k8s.deployment.name=media-service-demo,deployment.environment=$(OTEL_DEPLOYMENT_ENVIRONMENT)
            - name: SERVER_PORT
              value: "8080"
            - name: DEMO_MEDIA_FILE
              value: /opt/demo/demo.mp4
            - name: DEMO_MEDIA_ROOT
              value: /opt/demo/library
            - name: DEMO_MEDIA_BROADCAST_ROOT
              value: /broadcast-state
            - name: DEMO_MEDIA_REVIEW_ROOT
              value: /broadcast-state/rtsp-review
            - name: DEMO_CONTENT_SERVICE_BASE_URL
              value: http://content-service-demo.streaming-service-app.svc.cluster.local
            - name: DEMO_TRACE_MAP_USER_SERVICE_URL
              value: http://user-service-demo.streaming-service-app.svc.cluster.local/api/v1/demo/auth/health
            - name: DEMO_TRACE_MAP_CONTENT_SERVICE_URL
              value: http://content-service-demo.streaming-service-app.svc.cluster.local/api/v1/demo/content
            - name: DEMO_TRACE_MAP_BILLING_SERVICE_URL
              value: http://billing-service.streaming-service-app.svc.cluster.local:8070/api/v1/billing/health
            - name: DEMO_TRACE_MAP_AD_SERVICE_URL
              value: http://ad-service-demo.streaming-service-app.svc.cluster.local/api/v1/demo/ads/health
            - name: DEMO_AD_SERVICE_CURRENT_URL
              value: http://ad-service-demo.streaming-service-app.svc.cluster.local/api/v1/demo/ads/current
            - name: DEMO_AD_SERVICE_ISSUE_URL
              value: http://ad-service-demo.streaming-service-app.svc.cluster.local/api/v1/demo/ads/issues
            - name: DEMO_AD_SERVICE_TIMELINE_URL
              value: http://ad-service-demo.streaming-service-app.svc.cluster.local/api/v1/demo/ads/timeline
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://streaming-postgres.streaming-service-app.svc.cluster.local:5432/streaming?currentSchema=demo_media
            - name: SPRING_DATASOURCE_USERNAME
              value: streaming
            - name: SPRING_DATASOURCE_PASSWORD
              value: streaming
            - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              value: "4"
            - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
              value: "0"
            - name: SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT
              value: "60000"
            - name: SPRING_FLYWAY_DEFAULT_SCHEMA
              value: demo_media
            - name: SPRING_FLYWAY_SCHEMAS
              value: demo_media
            - name: SPRING_FLYWAY_TABLE
              value: demo_media_flyway_schema_history
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 9
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
              readOnly: true
            - name: demo-media
              mountPath: /opt/demo
              readOnly: true
            - name: broadcast-state
              mountPath: /broadcast-state
        - name: rtsp-restreamer
          image: jrottenberg/ffmpeg:7.1-alpine
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              set -eu
              DEMO_SOURCE_FILE="/opt/demo/demo.mp4"
              ROUTE_FILE="/broadcast-state/current-source.txt"
              HOUSE_BREAK_SEGMENT_SECONDS="${HOUSE_BREAK_SEGMENT_SECONDS:-90}"
              HOUSE_BREAK_SOURCE_INTERVAL="${HOUSE_BREAK_SOURCE_INTERVAL:-1}"
              LIVE_HLS_TIMEOUT_SECONDS="${LIVE_HLS_TIMEOUT_SECONDS:-10}"
              LIVE_HLS_STARTUP_GRACE_SECONDS="${LIVE_HLS_STARTUP_GRACE_SECONDS:-75}"
              DEMO_PID=""
              LIVE_PID=""
              LIVE_CONFIG=""
              LIVE_HLS_FAILURES=0
              LIVE_MODE=""
              LIVE_ROUTE_STARTED_AT=""
              ROUTE_WORK_DIR=""
              PREP_PID=""
              PREP_ROUTE_KEY=""
              PREP_WORK_DIR=""
              PREP_PLAYLIST=""
              PREP_READY_FILE=""
              PREP_FAILED_FILE=""

              stop_pid() {
                PID="$1"
                if [ -n "${PID}" ] && kill -0 "${PID}" 2>/dev/null; then
                  kill "${PID}" || true
                  wait "${PID}" || true
                fi
              }

              stop_demo_source() {
                stop_pid "${DEMO_PID}"
                DEMO_PID=""
              }

              stop_work_dir_processes() {
                WORK_DIR_PATH="$1"
                MATCHED_PIDS=""

                if [ -z "${WORK_DIR_PATH}" ]; then
                  return 0
                fi

                MATCHED_PIDS="$(ps -o pid,args | awk -v work_dir="${WORK_DIR_PATH}" 'NR > 1 && index($0, work_dir) > 0 {print $1}')"
                if [ -z "${MATCHED_PIDS}" ]; then
                  return 0
                fi

                for MATCHED_PID in ${MATCHED_PIDS}; do
                  if [ -n "${MATCHED_PID}" ] && kill -0 "${MATCHED_PID}" 2>/dev/null; then
                    kill "${MATCHED_PID}" || true
                  fi
                done

                sleep 1

                for MATCHED_PID in ${MATCHED_PIDS}; do
                  if [ -n "${MATCHED_PID}" ] && kill -0 "${MATCHED_PID}" 2>/dev/null; then
                    kill -9 "${MATCHED_PID}" || true
                  fi
                done
              }

              stop_route_prep() {
                stop_work_dir_processes "${PREP_WORK_DIR}"
                stop_pid "${PREP_PID}"
                PREP_PID=""
                PREP_ROUTE_KEY=""
                PREP_PLAYLIST=""
                PREP_READY_FILE=""
                PREP_FAILED_FILE=""
                if [ -n "${PREP_WORK_DIR}" ] && [ -d "${PREP_WORK_DIR}" ]; then
                  rm -rf "${PREP_WORK_DIR}" || true
                fi
                PREP_WORK_DIR=""
              }

              stop_live_stream() {
                stop_pid "${LIVE_PID}"
                LIVE_PID=""
                LIVE_MODE=""
                LIVE_ROUTE_STARTED_AT=""
                if [ -n "${ROUTE_WORK_DIR}" ] && [ -d "${ROUTE_WORK_DIR}" ]; then
                  rm -rf "${ROUTE_WORK_DIR}" || true
                fi
                ROUTE_WORK_DIR=""
              }

              start_demo_source() {
                ffmpeg -hide_banner -loglevel warning -re -stream_loop -1 -i "${DEMO_SOURCE_FILE}" -c copy -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/demo-source &
                DEMO_PID="$!"
              }

              broadcast_hls_ready() {
                wget -q -T "${LIVE_HLS_TIMEOUT_SECONDS}" -O- http://127.0.0.1:8888/live/index.m3u8 2>/dev/null | grep -q '#EXTM3U'
              }

              media_duration_seconds() {
                SOURCE_PATH="$1"

                if [ ! -f "${SOURCE_PATH}" ]; then
                  return 1
                fi

                ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "${SOURCE_PATH}" 2>/dev/null \
                  | awk 'NF { printf("%d\n", ($1 == int($1)) ? $1 : int($1) + 1); exit }'
              }

              should_check_hls_readiness() {
                if [ "${LIVE_MODE}" = "clean-file" ] && [ -n "${PREP_PID}" ] && kill -0 "${PREP_PID}" 2>/dev/null; then
                  return 1
                fi

                if [ -n "${LIVE_ROUTE_STARTED_AT}" ]; then
                  NOW_SECONDS="$(date +%s)"
                  ROUTE_AGE_SECONDS=$((NOW_SECONDS - LIVE_ROUTE_STARTED_AT))
                  if [ "${ROUTE_AGE_SECONDS}" -lt "${LIVE_HLS_STARTUP_GRACE_SECONDS}" ]; then
                    return 1
                  fi
                fi

                return 0
              }

              append_ad_break_assets() {
                PLAYLIST_PATH="$1"
                ROUTE_SLOW_AD_FLAG="$2"
                ROUTE_AD_LOAD_FAILURE_FLAG="$3"
                ROUTE_AD_ASSET_PATH="$4"
                ROUTE_STALL_ASSET_PATH="$5"

                if [ "${ROUTE_SLOW_AD_FLAG}" = "true" ] && [ -n "${ROUTE_STALL_ASSET_PATH}" ] && [ -f "${ROUTE_STALL_ASSET_PATH}" ]; then
                  printf "file '%s'\n" "${ROUTE_STALL_ASSET_PATH}" >> "${PLAYLIST_PATH}"
                fi

                if [ "${ROUTE_AD_LOAD_FAILURE_FLAG}" = "true" ]; then
                  if [ -n "${ROUTE_STALL_ASSET_PATH}" ] && [ -f "${ROUTE_STALL_ASSET_PATH}" ]; then
                    printf "file '%s'\n" "${ROUTE_STALL_ASSET_PATH}" >> "${PLAYLIST_PATH}"
                  fi
                elif [ -n "${ROUTE_AD_ASSET_PATH}" ] && [ -f "${ROUTE_AD_ASSET_PATH}" ]; then
                  printf "file '%s'\n" "${ROUTE_AD_ASSET_PATH}" >> "${PLAYLIST_PATH}"
                fi
              }

              build_segmented_loop_playlist() {
                SOURCE_PATH="$1"
                WORK_DIR_PATH="$2"
                PLAYLIST_PATH="$3"
                ROUTE_SLOW_AD_FLAG="$4"
                ROUTE_AD_LOAD_FAILURE_FLAG="$5"
                ROUTE_AD_ASSET_PATH="$6"
                ROUTE_STALL_ASSET_PATH="$7"
                SEGMENT_DIR_PATH="${WORK_DIR_PATH}/segments"

                mkdir -p "${SEGMENT_DIR_PATH}"
                ffmpeg -hide_banner -loglevel warning -y -i "${SOURCE_PATH}" \
                  -map 0:v:0 -map 0:a:0 \
                  -c:v libx264 -preset veryfast -threads 2 -pix_fmt yuv420p -r 24 -g 48 -keyint_min 48 -sc_threshold 0 \
                  -force_key_frames "expr:gte(t,n_forced*${HOUSE_BREAK_SEGMENT_SECONDS})" \
                  -c:a aac -ar 44100 -b:a 128k \
                  -f segment -segment_time "${HOUSE_BREAK_SEGMENT_SECONDS}" -reset_timestamps 1 \
                  "${SEGMENT_DIR_PATH}/segment-%03d.mp4" >/dev/null 2>&1 || return 1
                find "${SEGMENT_DIR_PATH}" -maxdepth 1 -type f -name 'segment-*.mp4' | sort > "${WORK_DIR_PATH}/segments.list"

                SEGMENT_COUNT="$(wc -l < "${WORK_DIR_PATH}/segments.list" | tr -d ' ')"
                if [ -z "${SEGMENT_COUNT}" ] || [ "${SEGMENT_COUNT}" -le 0 ]; then
                  return 1
                fi
                if [ "${SEGMENT_COUNT}" -le 1 ]; then
                  return 2
                fi

                : > "${PLAYLIST_PATH}"
                SEGMENT_INDEX=0
                LAST_SEGMENT_INDEX=$((SEGMENT_COUNT - 1))
                while IFS= read -r SEGMENT_PATH; do
                  [ -n "${SEGMENT_PATH}" ] || continue
                  printf "file '%s'\n" "${SEGMENT_PATH}" >> "${PLAYLIST_PATH}"
                  if [ "${SEGMENT_INDEX}" -lt "${LAST_SEGMENT_INDEX}" ]; then
                    append_ad_break_assets "${PLAYLIST_PATH}" "${ROUTE_SLOW_AD_FLAG}" "${ROUTE_AD_LOAD_FAILURE_FLAG}" "${ROUTE_AD_ASSET_PATH}" "${ROUTE_STALL_ASSET_PATH}"
                  fi
                  SEGMENT_INDEX=$((SEGMENT_INDEX + 1))
                done < "${WORK_DIR_PATH}/segments.list"
              }

              build_source_list_playlist() {
                SOURCE_LIST_PATH="$1"
                WORK_DIR_PATH="$2"
                PLAYLIST_PATH="$3"
                ROUTE_INSERT_AD_FLAG="$4"
                ROUTE_SLOW_AD_FLAG="$5"
                ROUTE_AD_LOAD_FAILURE_FLAG="$6"
                ROUTE_AD_ASSET_PATH="$7"
                ROUTE_STALL_ASSET_PATH="$8"

                if [ ! -f "${SOURCE_LIST_PATH}" ]; then
                  return 1
                fi

                grep -v '^[[:space:]]*$' "${SOURCE_LIST_PATH}" > "${WORK_DIR_PATH}/source-list" || true
                SOURCE_COUNT="$(wc -l < "${WORK_DIR_PATH}/source-list" | tr -d ' ')"
                if [ -z "${SOURCE_COUNT}" ] || [ "${SOURCE_COUNT}" -le 0 ]; then
                  return 1
                fi

                : > "${PLAYLIST_PATH}"
                SOURCE_INDEX=0
                while IFS= read -r SOURCE_PATH; do
                  [ -n "${SOURCE_PATH}" ] || continue
                  printf "file '%s'\n" "${SOURCE_PATH}" >> "${PLAYLIST_PATH}"
                  if [ "${ROUTE_INSERT_AD_FLAG}" = "true" ] && [ "${HOUSE_BREAK_SOURCE_INTERVAL}" -gt 0 ] && [ $(( (SOURCE_INDEX + 1) % HOUSE_BREAK_SOURCE_INTERVAL )) -eq 0 ]; then
                    append_ad_break_assets "${PLAYLIST_PATH}" "${ROUTE_SLOW_AD_FLAG}" "${ROUTE_AD_LOAD_FAILURE_FLAG}" "${ROUTE_AD_ASSET_PATH}" "${ROUTE_STALL_ASSET_PATH}"
                  fi
                  SOURCE_INDEX=$((SOURCE_INDEX + 1))
                done < "${WORK_DIR_PATH}/source-list"
              }

              build_route_playlist() {
                ROUTE_KIND_ARG="$1"
                ROUTE_SOURCE_ARG="$2"
                ROUTE_LOOP_ARG="$3"
                ROUTE_INSERT_AD_ARG="$4"
                ROUTE_SLOW_AD_ARG="$5"
                ROUTE_AD_LOAD_FAILURE_ARG="$6"
                ROUTE_AD_ASSET_ARG="$7"
                ROUTE_STALL_ASSET_ARG="$8"
                WORK_DIR_PATH="$9"
                PLAYLIST_PATH="${WORK_DIR_PATH}/live-playlist.txt"

                : > "${PLAYLIST_PATH}"

                if [ "${ROUTE_KIND_ARG}" = "playlist" ]; then
                  build_source_list_playlist "${ROUTE_SOURCE_ARG}" "${WORK_DIR_PATH}" "${PLAYLIST_PATH}" "${ROUTE_INSERT_AD_ARG}" "${ROUTE_SLOW_AD_ARG}" "${ROUTE_AD_LOAD_FAILURE_ARG}" "${ROUTE_AD_ASSET_ARG}" "${ROUTE_STALL_ASSET_ARG}"
                  return $?
                fi

                if [ ! -f "${ROUTE_SOURCE_ARG}" ]; then
                  return 1
                fi

                if [ "${ROUTE_INSERT_AD_ARG}" = "true" ] && [ "${ROUTE_LOOP_ARG}" = "true" ]; then
                  SOURCE_DURATION_SECONDS="$(media_duration_seconds "${ROUTE_SOURCE_ARG}" || true)"
                  if [ -n "${SOURCE_DURATION_SECONDS}" ] && [ "${SOURCE_DURATION_SECONDS}" -le "${HOUSE_BREAK_SEGMENT_SECONDS}" ]; then
                    printf "file '%s'\n" "${ROUTE_SOURCE_ARG}" >> "${PLAYLIST_PATH}"
                    append_ad_break_assets "${PLAYLIST_PATH}" "${ROUTE_SLOW_AD_ARG}" "${ROUTE_AD_LOAD_FAILURE_ARG}" "${ROUTE_AD_ASSET_ARG}" "${ROUTE_STALL_ASSET_ARG}"
                    return 0
                  fi

                  if build_segmented_loop_playlist "${ROUTE_SOURCE_ARG}" "${WORK_DIR_PATH}" "${PLAYLIST_PATH}" "${ROUTE_SLOW_AD_ARG}" "${ROUTE_AD_LOAD_FAILURE_ARG}" "${ROUTE_AD_ASSET_ARG}" "${ROUTE_STALL_ASSET_ARG}"; then
                    return 0
                  fi
                  SEGMENT_BUILD_STATUS="$?"
                  if [ "${SEGMENT_BUILD_STATUS}" -eq 1 ]; then
                    return 1
                  fi
                fi

                printf "file '%s'\n" "${ROUTE_SOURCE_ARG}" >> "${PLAYLIST_PATH}"
                if [ "${ROUTE_INSERT_AD_ARG}" != "true" ]; then
                  return 0
                fi

                append_ad_break_assets "${PLAYLIST_PATH}" "${ROUTE_SLOW_AD_ARG}" "${ROUTE_AD_LOAD_FAILURE_ARG}" "${ROUTE_AD_ASSET_ARG}" "${ROUTE_STALL_ASSET_ARG}"
              }

              start_concat_stream() {
                PLAYLIST_PATH="$1"
                ROUTE_LOOP_FLAG="$2"
                START_OFFSET_SECONDS="$3"

                if [ "${ROUTE_LOOP_FLAG}" = "true" ]; then
                  if [ "${START_OFFSET_SECONDS}" -gt 0 ]; then
                    ffmpeg -hide_banner -loglevel warning -fflags +genpts -re -stream_loop -1 -f concat -safe 0 -i "${PLAYLIST_PATH}" -ss "${START_OFFSET_SECONDS}" -map 0:v:0 -map 0:a:0 -c:v libx264 -preset ultrafast -threads 2 -tune zerolatency -pix_fmt yuv420p -c:a aac -ac 2 -ar 44100 -b:a 128k -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/live &
                  else
                    ffmpeg -hide_banner -loglevel warning -fflags +genpts -re -stream_loop -1 -f concat -safe 0 -i "${PLAYLIST_PATH}" -map 0:v:0 -map 0:a:0 -c:v libx264 -preset ultrafast -threads 2 -tune zerolatency -pix_fmt yuv420p -c:a aac -ac 2 -ar 44100 -b:a 128k -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/live &
                  fi
                else
                  if [ "${START_OFFSET_SECONDS}" -gt 0 ]; then
                    ffmpeg -hide_banner -loglevel warning -fflags +genpts -re -f concat -safe 0 -i "${PLAYLIST_PATH}" -ss "${START_OFFSET_SECONDS}" -map 0:v:0 -map 0:a:0 -c:v libx264 -preset ultrafast -threads 2 -tune zerolatency -pix_fmt yuv420p -c:a aac -ac 2 -ar 44100 -b:a 128k -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/live &
                  else
                    ffmpeg -hide_banner -loglevel warning -fflags +genpts -re -f concat -safe 0 -i "${PLAYLIST_PATH}" -map 0:v:0 -map 0:a:0 -c:v libx264 -preset ultrafast -threads 2 -tune zerolatency -pix_fmt yuv420p -c:a aac -ac 2 -ar 44100 -b:a 128k -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/live &
                  fi
                fi

                LIVE_PID="$!"
                LIVE_HLS_FAILURES=0
              }

              start_direct_file_stream() {
                SOURCE_PATH="$1"
                ROUTE_LOOP_FLAG="$2"

                if [ "${ROUTE_LOOP_FLAG}" = "true" ]; then
                  ffmpeg -hide_banner -loglevel warning -re -stream_loop -1 -i "${SOURCE_PATH}" -map 0:v:0 -map 0:a:0 -c:v libx264 -preset ultrafast -threads 2 -tune zerolatency -pix_fmt yuv420p -c:a aac -ac 2 -ar 44100 -b:a 128k -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/live &
                else
                  ffmpeg -hide_banner -loglevel warning -re -i "${SOURCE_PATH}" -map 0:v:0 -map 0:a:0 -c:v libx264 -preset ultrafast -threads 2 -tune zerolatency -pix_fmt yuv420p -c:a aac -ac 2 -ar 44100 -b:a 128k -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/live &
                fi

                LIVE_PID="$!"
                LIVE_HLS_FAILURES=0
              }

              start_rtsp_passthrough() {
                SOURCE_PATH="$1"
                ffmpeg -hide_banner -loglevel warning -rtsp_transport tcp -i "${SOURCE_PATH}" -c copy -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/live &
                LIVE_PID="$!"
                LIVE_HLS_FAILURES=0
              }

              start_file_route_prep() {
                PREP_ROUTE_KEY="$1"
                PREP_SOURCE_PATH="$2"
                PREP_ROUTE_LOOP="$3"
                PREP_ROUTE_INSERT_AD="$4"
                PREP_ROUTE_SLOW_AD="$5"
                PREP_ROUTE_AD_LOAD_FAILURE="$6"
                PREP_ROUTE_AD_ASSET="$7"
                PREP_ROUTE_STALL_ASSET="$8"

                PREP_WORK_DIR="$(mktemp -d /tmp/live-route-prep.XXXXXX)"
                PREP_PLAYLIST="${PREP_WORK_DIR}/live-playlist.txt"
                PREP_READY_FILE="${PREP_WORK_DIR}/.ready"
                PREP_FAILED_FILE="${PREP_WORK_DIR}/.failed"

                (
                  if build_route_playlist "file" "${PREP_SOURCE_PATH}" "${PREP_ROUTE_LOOP}" "${PREP_ROUTE_INSERT_AD}" "${PREP_ROUTE_SLOW_AD}" "${PREP_ROUTE_AD_LOAD_FAILURE}" "${PREP_ROUTE_AD_ASSET}" "${PREP_ROUTE_STALL_ASSET}" "${PREP_WORK_DIR}"; then
                    : > "${PREP_READY_FILE}"
                  else
                    : > "${PREP_FAILED_FILE}"
                  fi
                ) &
                PREP_PID="$!"
              }

              promote_prepared_file_route() {
                CURRENT_ROUTE_KEY="$1"

                if [ "${LIVE_MODE}" != "clean-file" ] || [ -z "${PREP_ROUTE_KEY}" ] || [ "${PREP_ROUTE_KEY}" != "${CURRENT_ROUTE_KEY}" ]; then
                  return 0
                fi

                if [ -n "${PREP_FAILED_FILE}" ] && [ -f "${PREP_FAILED_FILE}" ]; then
                  stop_route_prep
                  return 0
                fi

                if [ -n "${PREP_READY_FILE}" ] && [ -f "${PREP_READY_FILE}" ] && [ -n "${PREP_PLAYLIST}" ] && [ -f "${PREP_PLAYLIST}" ]; then
                  START_OFFSET_SECONDS=0
                  if [ -n "${LIVE_ROUTE_STARTED_AT}" ]; then
                    NOW_SECONDS="$(date +%s)"
                    START_OFFSET_SECONDS=$((NOW_SECONDS - LIVE_ROUTE_STARTED_AT))
                    if [ "${START_OFFSET_SECONDS}" -lt 0 ]; then
                      START_OFFSET_SECONDS=0
                    fi
                  fi

                  stop_pid "${LIVE_PID}"
                  LIVE_PID=""
                  if [ -n "${ROUTE_WORK_DIR}" ] && [ -d "${ROUTE_WORK_DIR}" ]; then
                    rm -rf "${ROUTE_WORK_DIR}" || true
                  fi
                  ROUTE_WORK_DIR="${PREP_WORK_DIR}"
                  PREP_PID=""
                  PREP_ROUTE_KEY=""
                  PREP_WORK_DIR=""
                  PREP_PLAYLIST=""
                  PREP_READY_FILE=""
                  PREP_FAILED_FILE=""

                  start_concat_stream "${ROUTE_WORK_DIR}/live-playlist.txt" "true" "${START_OFFSET_SECONDS}"
                  LIVE_MODE="stitched-file"
                  return 0
                fi

                if [ -n "${PREP_PID}" ] && ! kill -0 "${PREP_PID}" 2>/dev/null; then
                  stop_route_prep
                fi
              }

              start_live_stream() {
                ROUTE_KEY_ARG="$1"
                ROUTE_KIND_ARG="$2"
                ROUTE_SOURCE_ARG="$3"
                ROUTE_LOOP_ARG="$4"
                ROUTE_INSERT_AD_ARG="$5"
                ROUTE_SLOW_AD_ARG="$6"
                ROUTE_AD_LOAD_FAILURE_ARG="$7"
                ROUTE_AD_ASSET_ARG="$8"
                ROUTE_STALL_ASSET_ARG="$9"

                if [ "${ROUTE_KIND_ARG}" = "file" ] && [ "${ROUTE_INSERT_AD_ARG}" = "true" ] && [ "${ROUTE_LOOP_ARG}" = "true" ]; then
                  start_direct_file_stream "${ROUTE_SOURCE_ARG}" "${ROUTE_LOOP_ARG}"
                  LIVE_MODE="clean-file"
                  LIVE_ROUTE_STARTED_AT="$(date +%s)"
                  start_file_route_prep "${ROUTE_KEY_ARG}" "${ROUTE_SOURCE_ARG}" "${ROUTE_LOOP_ARG}" "${ROUTE_INSERT_AD_ARG}" "${ROUTE_SLOW_AD_ARG}" "${ROUTE_AD_LOAD_FAILURE_ARG}" "${ROUTE_AD_ASSET_ARG}" "${ROUTE_STALL_ASSET_ARG}"
                  return 0
                fi

                ROUTE_WORK_DIR="$(mktemp -d /tmp/live-route.XXXXXX)"
                if [ "${ROUTE_KIND_ARG}" = "file" ] || [ "${ROUTE_KIND_ARG}" = "playlist" ]; then
                  if ! build_route_playlist "${ROUTE_KIND_ARG}" "${ROUTE_SOURCE_ARG}" "${ROUTE_LOOP_ARG}" "${ROUTE_INSERT_AD_ARG}" "${ROUTE_SLOW_AD_ARG}" "${ROUTE_AD_LOAD_FAILURE_ARG}" "${ROUTE_AD_ASSET_ARG}" "${ROUTE_STALL_ASSET_ARG}" "${ROUTE_WORK_DIR}"; then
                    rm -rf "${ROUTE_WORK_DIR}" || true
                    ROUTE_WORK_DIR=""
                    return 1
                  fi
                  start_concat_stream "${ROUTE_WORK_DIR}/live-playlist.txt" "${ROUTE_LOOP_ARG}" "0"
                  if [ "${ROUTE_KIND_ARG}" = "playlist" ]; then
                    LIVE_MODE="playlist"
                  else
                    LIVE_MODE="stitched-file"
                  fi
                else
                  rm -rf "${ROUTE_WORK_DIR}" || true
                  ROUTE_WORK_DIR=""
                  start_rtsp_passthrough "${ROUTE_SOURCE_ARG}"
                  LIVE_MODE="rtsp"
                fi

                LIVE_ROUTE_STARTED_AT="$(date +%s)"
              }

              read_route() {
                if [ ! -f "${ROUTE_FILE}" ]; then
                  return 1
                fi

                ROUTE_KEY="$(sed -n '1p' "${ROUTE_FILE}")"
                ROUTE_KIND="$(sed -n '2p' "${ROUTE_FILE}")"
                ROUTE_LOOP="$(sed -n '3p' "${ROUTE_FILE}")"
                ROUTE_SOURCE="$(sed -n '4p' "${ROUTE_FILE}")"
                ROUTE_INSERT_AD="$(sed -n '5p' "${ROUTE_FILE}")"
                ROUTE_SLOW_AD="$(sed -n '6p' "${ROUTE_FILE}")"
                ROUTE_AD_LOAD_FAILURE="$(sed -n '7p' "${ROUTE_FILE}")"
                ROUTE_AD_ASSET="$(sed -n '8p' "${ROUTE_FILE}")"
                ROUTE_STALL_ASSET="$(sed -n '9p' "${ROUTE_FILE}")"

                [ -n "${ROUTE_INSERT_AD}" ] || ROUTE_INSERT_AD="false"
                [ -n "${ROUTE_SLOW_AD}" ] || ROUTE_SLOW_AD="false"
                [ -n "${ROUTE_AD_LOAD_FAILURE}" ] || ROUTE_AD_LOAD_FAILURE="false"

                [ -n "${ROUTE_KEY}" ] && [ -n "${ROUTE_KIND}" ] && [ -n "${ROUTE_SOURCE}" ]
              }

              trap 'stop_route_prep; stop_live_stream; stop_demo_source; exit 0' INT TERM

              while true; do
                if [ -f "${DEMO_SOURCE_FILE}" ]; then
                  if [ -z "${DEMO_PID}" ] || ! kill -0 "${DEMO_PID}" 2>/dev/null; then
                    stop_demo_source
                    start_demo_source
                  fi
                else
                  stop_demo_source
                fi

                if read_route; then
                  NEXT_CONFIG="${ROUTE_KEY}|${ROUTE_KIND}|${ROUTE_LOOP}|${ROUTE_SOURCE}|${ROUTE_INSERT_AD}|${ROUTE_SLOW_AD}|${ROUTE_AD_LOAD_FAILURE}|${ROUTE_AD_ASSET}|${ROUTE_STALL_ASSET}"
                  if [ "${NEXT_CONFIG}" != "${LIVE_CONFIG}" ] || [ -z "${LIVE_PID}" ] || ! kill -0 "${LIVE_PID}" 2>/dev/null; then
                    stop_route_prep
                    stop_live_stream
                    LIVE_CONFIG="${NEXT_CONFIG}"
                    start_live_stream "${ROUTE_KEY}" "${ROUTE_KIND}" "${ROUTE_SOURCE}" "${ROUTE_LOOP}" "${ROUTE_INSERT_AD}" "${ROUTE_SLOW_AD}" "${ROUTE_AD_LOAD_FAILURE}" "${ROUTE_AD_ASSET}" "${ROUTE_STALL_ASSET}"
                  else
                    if [ "${ROUTE_KIND}" = "file" ] && [ "${ROUTE_INSERT_AD}" = "true" ] && [ "${ROUTE_LOOP}" = "true" ]; then
                      promote_prepared_file_route "${ROUTE_KEY}"
                    fi

                    if [ -z "${LIVE_PID}" ] || ! kill -0 "${LIVE_PID}" 2>/dev/null; then
                      stop_route_prep
                      stop_live_stream
                      start_live_stream "${ROUTE_KEY}" "${ROUTE_KIND}" "${ROUTE_SOURCE}" "${ROUTE_LOOP}" "${ROUTE_INSERT_AD}" "${ROUTE_SLOW_AD}" "${ROUTE_AD_LOAD_FAILURE}" "${ROUTE_AD_ASSET}" "${ROUTE_STALL_ASSET}"
                    elif ! should_check_hls_readiness; then
                      LIVE_HLS_FAILURES=0
                    elif broadcast_hls_ready; then
                      LIVE_HLS_FAILURES=0
                    else
                      LIVE_HLS_FAILURES=$((LIVE_HLS_FAILURES + 1))
                      if [ "${LIVE_HLS_FAILURES}" -ge 10 ]; then
                        stop_route_prep
                        stop_live_stream
                        start_live_stream "${ROUTE_KEY}" "${ROUTE_KIND}" "${ROUTE_SOURCE}" "${ROUTE_LOOP}" "${ROUTE_INSERT_AD}" "${ROUTE_SLOW_AD}" "${ROUTE_AD_LOAD_FAILURE}" "${ROUTE_AD_ASSET}" "${ROUTE_STALL_ASSET}"
                      fi
                    fi
                  fi
                else
                  stop_route_prep
                  stop_live_stream
                  LIVE_CONFIG=""
                  LIVE_HLS_FAILURES=0
                fi

                sleep 2
              done
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: broadcast-state
              mountPath: /broadcast-state
            - name: demo-media
              mountPath: /opt/demo
              readOnly: true
        - name: rtsp-server
          image: bluenviron/mediamtx:latest
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: MTX_PROTOCOLS
              value: tcp
          ports:
            - containerPort: 8554
              name: rtsp
            - containerPort: 8888
              name: hls
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: source
          configMap:
            name: media-service-source
        - name: workspace
          emptyDir: {}
        - name: maven-repo
          emptyDir: {}
        - name: demo-media
          emptyDir: {}
        - name: broadcast-state
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: media-service-demo
  namespace: streaming-service-app
  labels:
    app.kubernetes.io/name: media-service-demo
    app.kubernetes.io/part-of: streaming-service-app
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: media-service-demo
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: media-service-demo-rtsp
  namespace: streaming-service-app
  labels:
    app.kubernetes.io/name: media-service-demo-rtsp
    app.kubernetes.io/part-of: streaming-service-app
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: media-service-demo
  ports:
    - name: rtsp
      port: 8554
      targetPort: rtsp
      protocol: TCP
