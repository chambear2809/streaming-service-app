apiVersion: v1
kind: ConfigMap
metadata:
  name: streaming-postgres-initdb
  namespace: streaming-service-app
  labels:
    app.kubernetes.io/name: streaming-postgres
    app.kubernetes.io/part-of: streaming-service-app
data:
  10-pg-stat-statements.sh: |
    #!/bin/sh
    set -eu

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" \
      -c 'CREATE EXTENSION IF NOT EXISTS pg_stat_statements;'

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname postgres \
      -c 'CREATE EXTENSION IF NOT EXISTS pg_stat_statements;'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streaming-postgres
  namespace: streaming-service-app
  labels:
    app.kubernetes.io/name: streaming-postgres
    app.kubernetes.io/part-of: streaming-service-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: streaming-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: streaming-postgres
        app.kubernetes.io/part-of: streaming-service-app
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - shared_preload_libraries=pg_stat_statements
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: streaming
            - name: POSTGRES_USER
              value: streaming
            - name: POSTGRES_PASSWORD
              value: streaming
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U streaming -d streaming
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: postgres-data
          emptyDir: {}
        - name: postgres-initdb
          configMap:
            name: streaming-postgres-initdb
---
apiVersion: v1
kind: Service
metadata:
  name: streaming-postgres
  namespace: streaming-service-app
  labels:
    app.kubernetes.io/name: streaming-postgres
    app.kubernetes.io/part-of: streaming-service-app
spec:
  selector:
    app.kubernetes.io/name: streaming-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: streaming-postgres-ingress
  namespace: streaming-service-app
  labels:
    app.kubernetes.io/name: streaming-postgres
    app.kubernetes.io/part-of: streaming-service-app
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: streaming-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: streaming-service-app
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: otel-splunk
      ports:
        - protocol: TCP
          port: 5432
