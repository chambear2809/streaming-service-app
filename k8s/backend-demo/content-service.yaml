apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-service-demo
  namespace: streaming-service-app
  labels:
    app.kubernetes.io/name: content-service-demo
    app.kubernetes.io/part-of: streaming-service-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: content-service-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: content-service-demo
        app.kubernetes.io/part-of: streaming-service-app
      annotations:
        instrumentation.opentelemetry.io/container-names: app
        instrumentation.opentelemetry.io/inject-java: otel-splunk/splunk-otel-collector
    spec:
      initContainers:
        - name: extract-source
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /workspace
              tar -xzf /source/content-service-source.tgz -C /workspace
          volumeMounts:
            - name: source
              mountPath: /source
              readOnly: true
            - name: workspace
              mountPath: /workspace
        - name: build-app
          image: maven:3.9.9-eclipse-temurin-22
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              cd /workspace/services/content-service
              mvn -f pom.demo.xml -Dmaven.test.skip=true package
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: maven-repo
              mountPath: /root/.m2
      containers:
        - name: app
          image: eclipse-temurin:22-jre
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - java -jar /workspace/services/content-service/target/content-service-demo.jar
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: OTEL_SERVICE_NAME
              value: content-service-demo
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_PROPAGATORS
              value: baggage,b3,tracecontext
            - name: OTEL_DEPLOYMENT_ENVIRONMENT
              value: 'streaming-app'
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=$(OTEL_SERVICE_NAME),service.namespace=streaming-service-app,k8s.namespace.name=streaming-service-app,k8s.deployment.name=content-service-demo,deployment.environment=$(OTEL_DEPLOYMENT_ENVIRONMENT)
            - name: SERVER_PORT
              value: "8080"
            - name: DEMO_MEDIA_URL
              value: /api/v1/demo/media/movie.mp4
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://streaming-postgres.streaming-service-app.svc.cluster.local:5432/streaming?currentSchema=demo_content
            - name: SPRING_DATASOURCE_USERNAME
              value: streaming
            - name: SPRING_DATASOURCE_PASSWORD
              value: streaming
            - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              value: "4"
            - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
              value: "0"
            - name: SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT
              value: "60000"
            - name: SPRING_FLYWAY_DEFAULT_SCHEMA
              value: demo_content
            - name: SPRING_FLYWAY_SCHEMAS
              value: demo_content
            - name: SPRING_FLYWAY_TABLE
              value: demo_content_flyway_schema_history
          startupProbe:
            httpGet:
              path: /api/v1/demo/content
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /api/v1/demo/content
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/demo/content
              port: http
            initialDelaySeconds: 25
            periodSeconds: 20
          volumeMounts:
            - name: workspace
              mountPath: /workspace
              readOnly: true
      volumes:
        - name: source
          configMap:
            name: content-service-source
        - name: workspace
          emptyDir: {}
        - name: maven-repo
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: content-service-demo
  namespace: streaming-service-app
  labels:
    app.kubernetes.io/name: content-service-demo
    app.kubernetes.io/part-of: streaming-service-app
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: content-service-demo
  ports:
    - name: http
      port: 80
      targetPort: http
