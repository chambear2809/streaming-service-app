apiVersion: apps/v1
kind: Deployment
metadata:
  name: thousandeyes
  namespace: te-demo
  labels:
    app: thousandeyes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thousandeyes
  template:
    metadata:
      labels:
        app: thousandeyes
    spec:
      hostname: te-agent-aleccham
      containers:
        - name: thousandeyes
          image: thousandeyes/enterprise-agent:latest
          imagePullPolicy: Always
          command:
            - /sbin/my_init
          env:
            - name: TEAGENT_ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: te-creds
                  key: TEAGENT_ACCOUNT_TOKEN
            - name: TEAGENT_INET
              value: "4"
          resources:
            requests:
              memory: 2000Mi
            limits:
              memory: 3584Mi
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thousandeyes-2
  namespace: te-demo
  labels:
    app: thousandeyes-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thousandeyes-2
  template:
    metadata:
      labels:
        app: thousandeyes-2
    spec:
      hostname: te-agent-aleccham-2
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - thousandeyes
                        - thousandeyes-2
      containers:
        - name: thousandeyes
          image: thousandeyes/enterprise-agent:latest
          imagePullPolicy: Always
          command:
            - /sbin/my_init
          env:
            - name: TEAGENT_ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: te-creds
                  key: TEAGENT_ACCOUNT_TOKEN
            - name: TEAGENT_INET
              value: "4"
          resources:
            requests:
              memory: 2000Mi
            limits:
              memory: 3584Mi
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
