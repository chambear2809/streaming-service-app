# Secret Template for ThousandEyes Enterprise Agents
#
# Copy this file, replace CHANGEME with the real ThousandEyes account token, and
# apply it before the Enterprise Agent deployments:
#
#   kubectl apply -f k8s/thousandeyes/secret-template.yaml
#
# Do not commit real token values to version control.

apiVersion: v1
kind: Secret
metadata:
  name: te-creds
  namespace: te-demo
type: Opaque
stringData:
  TEAGENT_ACCOUNT_TOKEN: "CHANGEME"
